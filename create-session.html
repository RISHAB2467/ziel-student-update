<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziel - Create Session</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ziel Teacher Portal</h1>
            <nav>
                <a href="teacher.html">Dashboard</a>
                <a href="create-session.html">Create Session</a>
                <a href="index.html">Student</a>
            </nav>
        </header>

        <main>
            <section class="welcome">
                <h2>Create New Teaching Session</h2>
                <p>Schedule a new session with a student</p>
            </section>

            <section class="form-section">
                <form id="session-form" class="session-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="teacher-name">Teacher Name <span class="required">*</span></label>
                            <select id="teacher-name" required>
                                <option value="">Select Teacher</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="student-name">Student Name <span class="required">*</span></label>
                            <div class="searchable-select">
                                <input 
                                    type="text" 
                                    id="student-search" 
                                    placeholder="Search for a student..."
                                    autocomplete="off"
                                >
                                <select id="student-name" required size="5">
                                    <option value="">Select Student</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="session-date">Date <span class="required">*</span></label>
                            <input type="date" id="session-date" required>
                        </div>

                        <div class="form-group">
                            <label for="session-time">Time <span class="required">*</span></label>
                            <input type="time" id="session-time" required>
                        </div>

                        <div class="form-group">
                            <label for="session-duration">Duration (minutes) <span class="required">*</span></label>
                            <select id="session-duration" required>
                                <option value="">Select Duration</option>
                                <option value="30">30 minutes</option>
                                <option value="45">45 minutes</option>
                                <option value="60">60 minutes</option>
                                <option value="90">90 minutes</option>
                                <option value="120">120 minutes</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="session-topic">Topic <span class="required">*</span></label>
                        <input 
                            type="text" 
                            id="session-topic" 
                            placeholder="e.g., Algebra - Quadratic Equations"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="session-notes">Notes (Optional)</label>
                        <textarea 
                            id="session-notes" 
                            rows="5"
                            placeholder="Add any additional notes or preparation materials needed..."
                        ></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="resetForm()">Clear Form</button>
                        <button type="submit" class="btn-primary">Create Session</button>
                    </div>
                </form>

                <div id="success-message" class="success-message" style="display: none;">
                    <h3>✓ Session Created Successfully!</h3>
                    <p>The teaching session has been scheduled.</p>
                    <button onclick="createAnother()">Create Another Session</button>
                    <button onclick="viewSessions()">View All Sessions</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2025 Ziel Education Platform</p>
        </footer>
    </div>

    <script src="auth.js"></script>
    <script>
        // Check authentication before loading page
        checkAuth('teacher');
        addLogoutButton();
    </script>
    <script src="session-form.js"></script>
</body>
</html>
