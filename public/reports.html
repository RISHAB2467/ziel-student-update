<!DOCTYPE html>
<html>
<head>
    <title>Entries Report - ZIEL</title>
    <link rel="stylesheet" href="styles.css?v=138">
    <style>
        body {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5a5 50%, #90ee90 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .header h1 {
            margin: 0;
            color: #2c3e50;
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .filters-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .filters-card h3 {
            margin: 0 0 20px 0;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            color: #34495e;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-filter {
            padding: 10px 25px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-filter:hover {
            background: #27ae60;
        }

        .btn-reset {
            padding: 10px 25px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            background: #7f8c8d;
        }

        .entries-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .entries-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #2ecc71;
        }

        .entries-header h3 {
            margin: 0;
            color: #2c3e50;
        }

        .entries-count {
            background: #2ecc71;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .entries-list {
            display: grid;
            gap: 15px;
        }

        .entry-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 5px solid #3498db;
            transition: all 0.3s;
        }

        .entry-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .entry-top {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .entry-field {
            display: flex;
            flex-direction: column;
        }

        .entry-label {
            font-size: 11px;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .entry-value {
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }

        .entry-value.large {
            font-size: 16px;
            color: #2980b9;
        }

        .entry-topic {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .entry-topic-label {
            font-size: 11px;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .entry-topic-text {
            color: #34495e;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-yes {
            background: #d5f4e6;
            color: #27ae60;
        }

        .badge-no {
            background: #fadbd8;
            color: #e74c3c;
        }

        .badge-payment {
            background: #fff3cd;
            color: #f39c12;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .filters-grid {
                grid-template-columns: 1fr;
            }

            .entry-top {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                justify-content: stretch;
            }

            .btn {
                flex: 1;
            }
        }

        /* Tablet (768px - 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 960px;
            }

            .filters-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Small Mobile (max-width: 480px) */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            input, select {
                font-size: 16px;
            }

            .btn {
                padding: 12px;
                font-size: 0.95em;
            }

            .entry-item {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>📊 Entries Report</h1>
        <div class="header-actions">
            <a href="teacher.html" class="btn btn-primary">📝 New Entry</a>
            <a href="admin.html" class="btn btn-primary">⚙️ Admin Panel</a>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Filters -->
    <div class="filters-card">
        <h3>🔍 Filter Entries</h3>
        <div class="filters-grid">
            <div class="filter-group">
                <label>Teacher</label>
                <select id="filterTeacher">
                    <option value="">All Teachers</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Student</label>
                <select id="filterStudent">
                    <option value="">All Students</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Date From</label>
                <input type="date" id="filterDateFrom">
            </div>

            <div class="filter-group">
                <label>Date To</label>
                <input type="date" id="filterDateTo">
            </div>

            <div class="filter-group">
                <label>Sheet Made</label>
                <select id="filterSheet">
                    <option value="">All</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
        </div>

        <div class="filter-actions">
            <button class="btn-reset" onclick="resetFilters()">🔄 Reset</button>
            <button class="btn-filter" onclick="applyFilters()">🔍 Apply Filters</button>
        </div>
    </div>

    <!-- Entries List -->
    <div class="entries-container">
        <div class="entries-header">
            <h3>All Entries</h3>
            <span class="entries-count" id="entriesCount">0 entries</span>
        </div>

        <div id="entriesList" class="entries-list">
            <div class="loading">Loading entries...</div>
        </div>
    </div>
</div>

<!-- App Logic with Firestore -->
<script type="module" src="app-firestore.js?v=164"></script>
<script>
    // Check authentication on page load
    window.addEventListener('load', function() {
        const role = localStorage.getItem('role');
        if (role !== 'teacher') {
            window.location.replace('index.html');
            return;
        }
    });

    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace('index.html');
    }
</script>
</body>
</html>
