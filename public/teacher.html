<!DOCTYPE html>
<html>
<head>
    <title>Teacher Panel - Daily Activity Log</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5a5 50%, #90ee90 100%);
            font-family: 'Roboto', sans-serif;
            color: #2c2c2c;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.95);
            padding: 24px 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(44, 44, 44, 0.15);
            border-bottom: 3px solid #d4af37;
        }

        .header h2 {
            margin: 0;
            color: #2c2c2c;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 0;
        }

        .teacher-info {
            color: #666666;
            font-size: 14px;
            font-weight: 400;
        }

        .logout-btn {
            padding: 10px 24px;
            background: #ffffff;
            color: #2c2c2c;
            border: 1px solid #d4af37;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
        }

        .logout-btn:hover {
            background: #d4af37;
            color: white;
            box-shadow: 0 2px 6px rgba(212, 175, 55, 0.3);
        }

        .autocomplete-container {
            position: relative;
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #dadce0;
            border-top: none;
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }

        .autocomplete-dropdown.show {
            display: block;
        }

        .autocomplete-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover {
            background: #f8f9fa;
        }

        .autocomplete-item.selected {
            background: #e8f5e9;
        }

        .autocomplete-highlight {
            font-weight: 600;
            color: #d4af37;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(44, 44, 44, 0.15);
            margin-bottom: 32px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .form-card h3 {
            margin: 0 0 24px 0;
            color: #2c2c2c;
            font-size: 20px;
            font-weight: 400;
            padding-bottom: 16px;
            border-bottom: 1px solid #e8eaed;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            color: #2c2c2c;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        .form-group label .required {
            color: #d93025;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            background: #ffffff;
            color: #202124;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 90px;
        }

        .time-range {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: center;
        }

        .time-range span {
            text-align: center;
            color: #5f6368;
            font-weight: 400;
            font-size: 14px;
        }

        .radio-group {
            display: flex;
            gap: 24px;
            margin-top: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #4285f4;
        }

        .radio-option label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
            color: #202124;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #d4af37, #c9a332);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            letter-spacing: 0.25px;
            text-transform: uppercase;
            box-shadow: 0 2px 6px rgba(212, 175, 55, 0.3);
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #c9a332, #b89530);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
            transform: translateY(-1px);
        }

        .entries-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(44, 44, 44, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .entries-card h3 {
            margin: 0 0 24px 0;
            color: #2c2c2c;
            font-size: 20px;
            font-weight: 400;
            padding-bottom: 16px;
            border-bottom: 1px solid #e8eaed;
        }

        .entry-item {
            background: rgba(255, 255, 255, 0.7);
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            border-left: 4px solid #90ee90;
            box-shadow: 0 1px 4px rgba(44, 44, 44, 0.1);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .entry-date {
            font-weight: 500;
            color: #2c2c2c;
            font-size: 14px;
        }

        .entry-day {
            color: #666666;
            font-size: 13px;
            margin-left: 8px;
        }

        .entry-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .entry-detail {
            color: #666666;
        }

        .entry-detail strong {
            color: #2c2c2c;
            font-weight: 500;
        }

        .entry-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .entry-actions button {
            padding: 8px 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            background: #ffffff;
        }

        .btn-edit {
            color: #1a73e8;
            border-color: #1a73e8;
        }

        .btn-edit:hover {
            background: #1a73e8;
            color: white;
        }

        .btn-delete {
            color: #d93025;
            border-color: #d93025;
        }

        .btn-delete:hover {
            background: #d93025;
            color: white;
        }

        .btn-edit:disabled,
        .btn-delete:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            color: #666666;
            border-color: #d4d4d4;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: #666666;
            font-size: 14px;
        }

        .help-text {
            font-size: 12px;
            color: #666666;
            margin-top: 4px;
        }

        .btn-reports {
            padding: 10px 20px;
            background: #ffffff;
            color: #2c2c2c;
            border: 1px solid #90ee90;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            display: inline-block;
        }

        .btn-reports:hover {
            background: #90ee90;
            color: white;
            box-shadow: 0 2px 6px rgba(144, 238, 144, 0.3);
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .entry-details {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div>
            <h2>Daily Activity Log</h2>
            <div class="teacher-info" id="teacherInfo">Loading...</div>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <!-- Entry Form -->
    <div class="form-card">
        <h3>Log New Class Entry</h3>
        <form id="entryForm">
            <div class="form-grid">
                <!-- Date & Day -->
                <div class="form-group">
                    <label>Date<span class="required">*</span></label>
                    <input type="date" id="date" required>
                    <div class="help-text" id="dayDisplay"></div>
                </div>

                <!-- Student Selection -->
                <div class="form-group">
                    <label>Student Name<span class="required">*</span></label>
                    <input id="studentSearch" placeholder="Search student..." style="margin-bottom: 8px;">
                    <select id="studentName" required></select>
                </div>

                <!-- Time From -->
                <div class="form-group">
                    <label>Time From<span class="required">*</span></label>
                    <input type="time" id="timeFrom" required>
                </div>

                <!-- Time To -->
                <div class="form-group">
                    <label>Time To<span class="required">*</span></label>
                    <input type="time" id="timeTo" required>
                </div>

                <!-- Number of Classes -->
                <div class="form-group">
                    <label>Number of Classes<span class="required">*</span></label>
                    <input type="number" id="classCount" min="1" max="10" required>
                    <div class="help-text">How many classes in this session?</div>
                </div>

                <!-- Sheet Made -->
                <div class="form-group">
                    <label>Sheet Made?<span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="sheetYes" name="sheetMade" value="yes" required>
                            <label for="sheetYes">Yes</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="sheetNo" name="sheetMade" value="no">
                            <label for="sheetNo">No</label>
                        </div>
                    </div>
                </div>

                <!-- Topic -->
                <div class="form-group full-width">
                    <label>Topic Taught<span class="required">*</span></label>
                    <textarea id="topic" placeholder="Enter topics covered in this session..." required></textarea>
                </div>

                <!-- Payment (Optional) -->
                <div class="form-group full-width">
                    <label>Payment (Optional)</label>
                    <input type="text" id="payment" placeholder="Enter payment amount or leave blank">
                    <div class="help-text">Leave blank if no payment received</div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Save Entry</button>
        </form>
    </div>

    <!-- Recent Entries -->
    <div class="entries-card">
        <h3>Recent Entries (Last 24 Hours)</h3>
        <div id="recentEntries">
            <div class="empty-state">Loading entries...</div>
        </div>
    </div>
</div>

<!-- App Logic with Firestore -->
<script type="module" src="app-firestore.js"></script>
<script>
    // Display day of week when date changes
    document.getElementById('date')?.addEventListener('change', function() {
        const dateValue = this.value;
        if (dateValue) {
            const date = new Date(dateValue + 'T00:00:00');
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[date.getDay()];
            document.getElementById('dayDisplay').textContent = dayName;
        }
    });

    // Set today's date as default
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = today;
        document.getElementById('date').dispatchEvent(new Event('change'));

        // Display teacher info
        const teacherName = localStorage.getItem('teacherName');
        const teacherEmail = localStorage.getItem('teacherEmail');
        if (teacherName) {
            document.getElementById('teacherInfo').textContent = `Logged in as: ${teacherName} (${teacherEmail || ''})`;
        }

        // Load students for autocomplete
        loadStudentsForTeacher();
        
        // Load recent entries
        loadRecentEntries();
    });

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    }
</script>
</body>
</html>
