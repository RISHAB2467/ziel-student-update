<html>
<head>
    <title>Import Students - ZIEL</title>
    <style>
        body {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5a5 50%, #90ee90 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        button {
            padding: 15px 30px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #27ae60;
        }
        .btn-secondary {
            background: #3498db;
        }
        .btn-secondary:hover {
            background: #2980b9;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
        }
        .success {
            color: #2ecc71;
            font-weight: bold;
        }
        .error {
            color: #e74c3c;
            font-weight: bold;
        }
        .info {
            color: #3498db;
            font-size: 14px;
            margin-top: 10px;
        }
        .progress {
            margin-top: 10px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Import Students to Firestore</h1>
        <p>Paste student names below (one per line). The system will automatically add them to Firestore if they don't already exist.</p>
        
        <textarea id="studentList" placeholder="Paste student names here...
One name per line
Example:
Sanway
Aditya Shaw
Abhirup Mondal"></textarea>
        
        <button onclick="importStudents()">✅ Import Students</button>
        <button class="btn-secondary" onclick="checkExisting()">🔍 Check Existing Students</button>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            getDocs,
            query,
            where,
            Timestamp 
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyALyA_Yod2TKWonP_oSFehR6-tKq9xDC3I",
            authDomain: "ziel-d0064.firebaseapp.com",
            projectId: "ziel-d0064",
            storageBucket: "ziel-d0064.firebasestorage.app",
            messagingSenderId: "249203765928",
            appId: "1:249203765928:web:391650d800d197d902c89d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.importStudents = async function() {
            const textarea = document.getElementById('studentList');
            const statusDiv = document.getElementById('status');
            
            const names = textarea.value
                .split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);

            if (names.length === 0) {
                alert('Please enter at least one student name');
                return;
            }

            statusDiv.style.display = 'block';
            statusDiv.innerHTML = '<p class="info">⏳ Starting import process...</p>';

            let added = 0;
            let skipped = 0;
            let errors = 0;
            const progressDiv = document.createElement('div');
            progressDiv.className = 'progress';
            statusDiv.appendChild(progressDiv);

            try {
                for (let i = 0; i < names.length; i++) {
                    const name = names[i];
                    progressDiv.textContent = `Processing ${i + 1}/${names.length}: ${name}`;

                    try {
                        // Check if student already exists
                        const q = query(collection(db, "students"), where("name", "==", name));
                        const snapshot = await getDocs(q);

                        if (snapshot.empty) {
                            // Add new student
                            await addDoc(collection(db, "students"), {
                                name: name,
                                status: "active",
                                createdAt: Timestamp.now()
                            });
                            added++;
                        } else {
                            skipped++;
                        }
                    } catch (error) {
                        console.error(`Error with ${name}:`, error);
                        errors++;
                    }

                    // Small delay to avoid overwhelming Firestore
                    if (i % 10 === 0 && i > 0) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                }

                statusDiv.innerHTML = `
                    <p class="success">✅ Import Complete!</p>
                    <p>✅ <strong>${added}</strong> students added</p>
                    <p>⏭️ <strong>${skipped}</strong> students already existed (skipped)</p>
                    ${errors > 0 ? `<p class="error">❌ <strong>${errors}</strong> errors</p>` : ''}
                    <p class="info">Total processed: ${names.length}</p>
                    <p><a href="admin.html">Go to Admin Panel</a></p>
                `;

            } catch (error) {
                console.error('Import error:', error);
                statusDiv.innerHTML = `
                    <p class="error">❌ Error: ${error.message}</p>
                    <p>Check browser console for details</p>
                `;
            }
        };

        window.checkExisting = async function() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = '<p class="info">⏳ Checking existing students...</p>';

            try {
                const snapshot = await getDocs(collection(db, "students"));
                
                const activeStudents = [];
                const inactiveStudents = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.status === "active") {
                        activeStudents.push(data.name);
                    } else {
                        inactiveStudents.push(data.name);
                    }
                });

                activeStudents.sort();
                inactiveStudents.sort();

                statusDiv.innerHTML = `
                    <p class="success">✅ Database Check Complete</p>
                    <p><strong>Total Students:</strong> ${snapshot.size}</p>
                    <p><strong>Active:</strong> ${activeStudents.length}</p>
                    <p><strong>Inactive:</strong> ${inactiveStudents.length}</p>
                    <div style="margin-top: 15px; max-height: 300px; overflow-y: auto; background: white; padding: 15px; border-radius: 5px;">
                        <strong>Active Students:</strong><br>
                        ${activeStudents.map((name, i) => `${i + 1}. ${name}`).join('<br>')}
                    </div>
                `;

            } catch (error) {
                console.error('Check error:', error);
                statusDiv.innerHTML = `
                    <p class="error">❌ Error: ${error.message}</p>
                `;
            }
        };
