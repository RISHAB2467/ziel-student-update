<!DOCTYPE html>
<html>
<head>
    <title>Update Teacher Emails</title>
    <style>
        body {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5a5 50%, #90ee90 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        button {
            padding: 15px 30px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #27ae60;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
            text-align: left;
        }
        .success {
            color: #2ecc71;
            font-weight: bold;
        }
        .error {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Update Teacher Emails</h1>
        <p>This will add email addresses to existing teachers who don't have one.</p>
        
        <button onclick="updateEmails()">Update Teacher Emails</button>
        <button onclick="checkTeachers()">Check Current Teachers</button>
        
        <div id="status" class="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getFirestore, 
            collection, 
            getDocs,
            doc,
            updateDoc
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyALyA_Yod2TKWonP_oSFehR6-tKq9xDC3I",
            authDomain: "ziel-d0064.firebaseapp.com",
            projectId: "ziel-d0064",
            storageBucket: "ziel-d0064.firebasestorage.app",
            messagingSenderId: "249203765928",
            appId: "1:249203765928:web:391650d800d197d902c89d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Email mapping for existing teachers
        const emailMap = {
            "Prof. Anderson": "anderson@ziel.edu",
            "Dr. Williams": "williams@ziel.edu",
            "Dr. Brown": "brown@ziel.edu",
            "Ms. Johnson": "johnson@ziel.edu",
            "Mr. Davis": "davis@ziel.edu"
        };

        window.updateEmails = async function() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<p>Updating teacher emails...</p>';

            try {
                const snapshot = await getDocs(collection(db, "teachers"));
                let updated = 0;
                let skipped = 0;

                for (const docSnap of snapshot.docs) {
                    const data = docSnap.data();
                    
                    // If teacher doesn't have email, add it
                    if (!data.email) {
                        const email = emailMap[data.name] || `${data.name.toLowerCase().replace(/[^a-z]/g, '')}@ziel.edu`;
                        
                        await updateDoc(doc(db, "teachers", docSnap.id), {
                            email: email
                        });
                        
                        updated++;
                    } else {
                        skipped++;
                    }
                }

                statusDiv.innerHTML = `
                    <p class="success">✅ Update Complete!</p>
                    <p>Teachers updated: ${updated}</p>
                    <p>Already had emails: ${skipped}</p>
                    <p><a href="index.html">Go to Login Page</a></p>
                `;
            } catch (error) {
                console.error("Error:", error);
                statusDiv.innerHTML = `
                    <p class="error">❌ Error: ${error.message}</p>
                    <p>Check browser console for details</p>
                `;
            }
        };

        window.checkTeachers = async function() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<p>Checking teachers...</p>';

            try {
                const snapshot = await getDocs(collection(db, "teachers"));

                const teachersList = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return `<strong>${data.name}</strong> - ${data.email || '<em style="color: red;">NO EMAIL</em>'} (${data.active ? 'Active' : 'Inactive'})`;
                }).join('<br>');

                statusDiv.innerHTML = `
                    <p class="success">✅ Teachers in Database (${snapshot.size})</p>
                    <div style="margin: 20px 0;">${teachersList || 'None'}</div>
                `;
            } catch (error) {
                console.error("Error:", error);
                statusDiv.innerHTML = `
                    <p class="error">❌ Error: ${error.message}</p>
                    <p>Check browser console for details</p>
                `;
            }
        };
    </script>
</body>
</html>
